<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ფინალური პროექტები | AI EXPRESS</title>
    <link href="https://cdn.jsdelivr.net/gh/Loopple/FiraGO@1.0/cdn/FiraGO.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #f59e0b;
            --secondary-color: #ef4444;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success-color: #10b981;
            --accent-color: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'FiraGO', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header block */
        .header {
            text-align: center;
            padding: 3rem 2rem;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15) 0%, rgba(239, 68, 68, 0.15) 100%);
            border-radius: 20px;
            border: 1px solid rgba(245, 158, 11, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .header .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto;
        }

        /* Info boxes */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .info-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.2rem;
            border: 1px solid rgba(245, 158, 11, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        .info-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .info-card-icon {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .info-card-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }

        .info-card-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        /* Tabs Navigation */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.8rem 1.8rem;
            border-radius: 30px;
            font-family: 'FiraGO', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #0f172a;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        .tab-content.active {
            display: block;
        }

        /* Student Directory view */
        .directory-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .directory-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem 0.5rem;
            }
            .header {
                padding: 2rem 1rem;
            }
            .header h1 {
                font-size: 2rem;
            }
            .tabs {
                flex-direction: column;
                gap: 0.5rem;
            }
            .tab-btn {
                width: 100%;
                text-align: center;
                padding: 0.6rem 1.2rem;
            }
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }
            .info-card {
                padding: 0.8rem 0.5rem;
            }
            .info-card-value {
                font-size: 0.95rem;
            }
            .project-card {
                padding: 1.2rem;
            }
            .project-card-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .badge-difficulty {
                margin-top: 0.5rem;
            }
            .action-bar {
                justify-content: center;
                flex-direction: column;
                gap: 0.8rem;
            }
            .action-btn {
                width: 100%;
                justify-content: center;
            }
            .generator-form {
                padding: 1.2rem;
            }
        }

        .sidebar {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: fit-content;
        }

        .search-box {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: var(--text-primary);
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            font-family: 'FiraGO', sans-serif;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.2);
        }

        .student-list {
            list-style: none;
            max-height: none;
            overflow-y: auto;
            padding-right: 0.3rem;
        }

        .student-list::-webkit-scrollbar {
            width: 5px;
        }

        .student-list::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.3);
            border-radius: 5px;
        }

        .student-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .student-item:hover {
            border-color: rgba(245, 158, 11, 0.5);
            background: rgba(245, 158, 11, 0.05);
        }

        .student-item.active {
            border-color: var(--primary-color);
            background: rgba(245, 158, 11, 0.1);
        }

        .student-item-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .student-item-role {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        /* Interactive Generator View */
        .generator-form {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem;
            border: 1px solid rgba(245, 158, 11, 0.1);
            max-width: 700px;
            margin: 0 auto 2rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.8rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-input, .form-select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-family: 'FiraGO', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.25);
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #0f172a;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-family: 'FiraGO', sans-serif;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
            margin-top: 1rem;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
        }

        /* Project Card Styling */
        .project-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem;
            border: 2px solid rgba(245, 158, 11, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            animation: cardSlide 0.5s ease-out forwards;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary-color), var(--secondary-color));
        }

        .project-greeting-box {
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .lecturer-avatar {
            font-size: 2.2rem;
            background: rgba(245, 158, 11, 0.15);
            padding: 0.5rem;
            border-radius: 50%;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .greeting-text {
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .greeting-text strong {
            color: var(--primary-color);
        }

        .project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 1.5rem;
        }

        .project-card-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-color);
            flex: 1;
            min-width: 280px;
        }

        .badge-difficulty {
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .difficulty-Beginner {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .difficulty-Intermediate {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .difficulty-Advanced {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .project-meta {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .meta-row strong {
            color: var(--text-primary);
        }

        .lecture-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.3rem;
        }

        .lecture-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .project-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .project-section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .project-description {
            font-size: 1.05rem;
            color: var(--text-primary);
            line-height: 1.7;
        }

        .project-list {
            list-style: none;
        }

        .project-list li {
            position: relative;
            padding-left: 1.8rem;
            margin-bottom: 0.8rem;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .project-list li::before {
            content: '✓';
            position: absolute;
            left: 0.3rem;
            color: var(--success-color);
            font-weight: 800;
        }

        .deliverable-box {
            background: rgba(16, 185, 129, 0.05);
            border-left: 4px solid var(--success-color);
            border-radius: 0 12px 12px 0;
            padding: 1.2rem 1.5rem;
            margin-top: 1.5rem;
        }

        .deliverable-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--success-color);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 1.5rem;
            flex-wrap: wrap;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-family: 'FiraGO', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-btn:hover {
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--primary-color);
        }

        .action-btn.print-btn {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15) 0%, rgba(239, 68, 68, 0.15) 100%);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .action-btn.print-btn:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.2);
        }

        /* Custom alert message */
        .success-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--success-color);
            color: #0f172a;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            display: none;
            z-index: 10000;
            animation: slideUp 0.3s ease-out;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes cardSlide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Navigation buttons footer */
        .navigation-footer {
            text-align: center;
            margin-top: 3rem;
        }

        .back-button {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: #0f172a;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.3);
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(245, 158, 11, 0.5);
        }

        /* Print styles */
        @media print {
            body {
                background: white;
                color: black;
                padding: 0;
            }

            .container {
                max-width: 100%;
            }

            .header, .tabs, .sidebar, .generator-form, .action-bar, .navigation-footer {
                display: none !important;
            }

            .project-card {
                border: none;
                box-shadow: none;
                padding: 0;
                background: white;
                color: black;
            }

            .project-card::before {
                display: none;
            }

            .project-greeting-box, .project-section, .deliverable-box {
                background: #f8f9fa;
                border: 1px solid #ddd;
                color: black;
            }

            .project-card-title, .project-section-title, .deliverable-title {
                color: #333 !important;
            }

            .lecture-tag {
                border: 1px solid #ccc;
                color: black;
                background: white;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎓 ფინალური პროექტების პორტალი</h1>
            <p class="subtitle">AI - ხელოვნური ინტელექტი პრაქტიკაში (EXPRESS ვერსია)</p>
        </div>

        <!-- Info Grid -->
        <div class="info-grid">
            <div class="info-card">
                <div class="info-card-icon">🎯</div>
                <div class="info-card-title">პროექტის წონა</div>
                <div class="info-card-value">20 ქულა (20%)</div>
            </div>
            <div class="info-card">
                <div class="info-card-icon">⏱️</div>
                <div class="info-card-title">სამუშაო დრო</div>
                <div class="info-card-value">2-2.5 საათი</div>
            </div>
            <div class="info-card">
                <div class="info-card-icon">📊</div>
                <div class="info-card-title">პრეზენტაცია</div>
                <div class="info-card-value">5-7 წუთი</div>
            </div>
            <div class="info-card">
                <div class="info-card-icon">🚀</div>
                <div class="info-card-title">ფორმატი</div>
                <div class="info-card-value">სლაიდები + დემო</div>
            </div>
        </div>

        <!-- Tabs Navigation -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('directory')">პროექტების ჩამონათვალი</button>
            <button class="tab-btn" onclick="switchTab('generator')">პერსონალური გენერატორი</button>
        </div>

        <!-- Tab 1: Student Directory -->
        <div id="directory-tab" class="tab-content active">
            <div class="directory-layout">
                <!-- Sidebar -->
                <div class="sidebar">
                    <input type="text" class="search-box" id="studentSearch" placeholder="მოძებნე პროექტი/მიმართულება..." onkeyup="filterStudents()">
                    <ul class="student-list" id="studentList">
                        <!-- Dynamic list items from javascript -->
                    </ul>
                </div>

                <!-- Main Project Display -->
                <div class="project-display" id="projectDisplay">
                    <!-- Project card will be generated here -->
                </div>
            </div>
        </div>

        <!-- Tab 2: Custom Generator -->
        <div id="generator-tab" class="tab-content">
            <div class="generator-form">
                <div class="form-title">შექმენი შენი პროექტის ვარიანტი</div>
                <div class="form-group">
                    <label class="form-label" for="customName">სახელი და გვარი:</label>
                    <input type="text" class="form-input" id="customName" placeholder="მაგ. ანა კაპანაძე">
                </div>
                <div class="form-group">
                    <label class="form-label" for="customRole">თქვენი პროფესია / სამუშაო სფერო:</label>
                    <input type="text" class="form-input" id="customRole" placeholder="მაგ. გაყიდვების მენეჯერი, იურისტი, ექიმი...">
                </div>
                <div class="form-group">
                    <label class="form-label" for="customFocus">პროექტის მთავარი AI ფოკუსი:</label>
                    <select class="form-select" id="customFocus">
                        <option value="marketing">კრეატიული მარკეტინგი & კონტენტ-კამპანია (სურათები, Gamma, ვიდეო)</option>
                        <option value="automation">ავტომატიზაცია Make.com-ზე (სამუშაო პროცესების გამარტივება)</option>
                        <option value="nocode">Lovable.dev-ზე და Supabase-ზე დაფუძნებული No-Code ვებ-აპი</option>
                        <option value="research">სიღრმისეული კვლევა, Perplexity Deep Research & NotebookLM</option>
                        <option value="agents">Custom GPT & Claude Project ასისტენტის გამართვა ცოდნის ბაზით</option>

        // Functions for Switch Tabs
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            if (tabName === 'directory') {
                document.querySelector('.tab-btn[onclick="switchTab(\'directory\')"]').classList.add('active');
                document.getElementById('directory-tab').classList.add('active');
                // Auto load first student if empty
                if (document.getElementById('projectDisplay').innerHTML.trim() === '') {
                    displayStudentProject(0);
                }
            } else {
                document.querySelector('.tab-btn[onclick="switchTab(\'generator\')"]').classList.add('active');
                document.getElementById('generator-tab').classList.add('active');
            }
        }

        // Initialize Student List in Directory Sidebar
        function loadStudentList() {
            const listContainer = document.getElementById('studentList');
            listContainer.innerHTML = '';
            
            presetStudents.forEach((student, index) => {
                const li = document.createElement('li');
                li.className = `student-item ${index === 0 ? 'active' : ''}`;
                li.setAttribute('onclick', `displayStudentProject(${index})`);
                li.innerHTML = `
                    <div class="student-item-name">ვარიანტი ${index + 1}</div>
                    <div class="student-item-role">${student.role}</div>
                `;
                listContainer.appendChild(li);
            });

            // Display first student by default
            displayStudentProject(0);
        }

        // Filter students list in Sidebar based on search input
        function filterStudents() {
            const query = document.getElementById('studentSearch').value.toLowerCase();
            const listItems = document.querySelectorAll('.student-item');
            
            presetStudents.forEach((student, index) => {
                const match = `ვარიანტი ${index + 1}`.toLowerCase().includes(query) || student.role.toLowerCase().includes(query);
                listItems[index].style.display = match ? 'block' : 'none';
            });
        }

        // Display selected Student's Project Card
        function displayStudentProject(index) {
            // Update active state in list
            document.querySelectorAll('.student-item').forEach((item, idx) => {
                if (idx === index) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            const student = presetStudents[index];
            const displayArea = document.getElementById('projectDisplay');
            
            displayArea.innerHTML = renderProjectCard(student);
        }

                description = `პროექტი ორიენტირებულია პერსონალური ან კორპორატიული AI ასისტენტის გამართვაზე Claude Projects-ში ან Custom GPTs-ში ${role}-ს სპეციფიკური გაიდლაინებით.`;
                tasks = [
                    `პროფესიული საქმიანობისთვის (${role}) საჭირო 2-3 საინფორმაციო დოკუმენტის (FAQ, SOP, ბრენდბუქი) მომზადება.`,
                    `Claude Projects-ში ახალი პროექტის შექმნა და დოკუმენტების ატვირთვა ცოდნის ბაზაში (Knowledge Base).`,
                    `დეტალური, პროფესიონალური System Prompt-ის დაწერა, სადაც გაიწერება აგენტის როლი, ტონი და მონაცემთა უსაფრთხოების/PII დაცვის წესები.`,
                    `კლიენტებთან ან თანამშრომლებთან ურთიერთობის 3 სატესტო სცენარის გაშვება და შედეგების დოკუმენტირება.`
                ];
                deliverables = [
                    "Claude Project ასისტენტისთვის დაწერილი System Prompt (TXT/MD ფორმატში)",
                    "ცოდნის ბაზაში ატვირთული ფაილების სია და პროექტის სქრინშოტი",
                    "3 სატესტო დიალოგის სქრინშოტი ან ტექსტური რეპორტი"
                ];
            }

            const customProject = {
                name: name,
                role: role,
                title: title,
                difficulty: difficulty,
                lectures: lectures,
                description: description,
                tasks: tasks,
                deliverables: deliverables,
                time: time
            };

            const displayArea = document.getElementById('customProjectDisplay');
            displayArea.innerHTML = renderProjectCard(customProject);
            
            // Scroll to project card
            displayArea.scrollIntoView({ behavior: 'smooth' });
        }

        // Copy Project Brief to clipboard
        function copyProjectBrief(nameOrVar, projectTitle) {
            const isVar = nameOrVar.startsWith('ვარიანტი');
            const briefText = `ფინალური პროექტის ბრიფი\n${isVar ? 'ვარიანტი' : 'სტუდენტი'}: ${nameOrVar}\nპროექტი: ${projectTitle}\nდეტალური ინფორმაცია ხელმისაწვდომია AI EXPRESS პორტალზე.`;
            navigator.clipboard.writeText(briefText).then(() => {
                const toast = document.getElementById('successToast');
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            });
        }

        // Run when page loads
        document.addEventListener('DOMContentLoaded', () => {
            loadStudentList();
        });
    </script>
</body>
</html>
