<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #8b5cf6;
    --text: #eee;
    --text-dim: #999;
    --user-bubble: #0f3460;
    --assistant-bubble: #1a1a2e;
    --border: #333;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 8px;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  #model-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    max-width: 220px;
  }
  #model-select:focus { outline: none; border-color: var(--accent); }

  .header-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .header-btn:hover { background: var(--surface2); }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  .msg {
    max-width: 720px;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.55;
    font-size: 0.95rem;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .msg.user { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--assistant-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  .msg .label {
    font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px;
  }

  .typing-cursor::after {
    content: '▋'; animation: blink 0.7s infinite; color: var(--accent);
  }
  @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0 } }

  #welcome {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px 20px; color: var(--text-dim);
  }
  #welcome h2 { color: var(--text); margin-bottom: 8px; }
  #welcome p { max-width: 400px; line-height: 1.6; }

  #input-bar {
    display: flex; gap: 10px; padding: 14px 20px; background: var(--surface);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  #input-bar textarea {
    flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 10px 14px; font-size: 0.95rem; resize: none;
    font-family: inherit; max-height: 150px; line-height: 1.4;
  }
  #input-bar textarea:focus { outline: none; border-color: var(--accent); }
  #send-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 0 22px; font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s; align-self: flex-end;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 28px 32px; width: 90%; max-width: 520px; max-height: 85vh; overflow-y: auto;
  }
  .modal h2 { margin-bottom: 18px; font-size: 1.1rem; }
  .modal label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 6px; margin-top: 14px; }
  .modal input, .modal textarea, .modal select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 9px 12px; font-size: 0.9rem; font-family: inherit;
  }
  .modal select { cursor: pointer; }
  .modal textarea { resize: vertical; min-height: 80px; line-height: 1.4; }
  .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
  .modal-actions button {
    padding: 8px 20px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); cursor: pointer; font-size: 0.9rem;
  }
  .modal-actions button.primary { background: var(--accent); border-color: var(--accent); font-weight: 600; }
  .modal-actions button:hover { opacity: 0.85; }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
  .status-dot.connected { background: #4ade80; }
  .status-dot.disconnected { background: #f87171; }

  .model-change-notice {
    align-self: center; background: none; color: var(--text-dim); font-size: 0.8rem;
    font-style: italic; border: none; padding: 4px 12px;
  }
</style>
</head>
<body>

<header>
  <h1><span>Gemini</span></h1>
  <div class="header-right">
    <select id="model-select" title="Model"></select>
    <span id="status"><span class="status-dot disconnected"></span>no key</span>
    <button class="header-btn" id="list-models-btn" title="Show available models">📋</button>
    <button class="header-btn" id="settings-btn">⚙ Settings</button>
    <button class="header-btn" id="clear-btn">🗑 Clear</button>
  </div>
</header>

<div id="chat"></div>

<div id="welcome">
  <h2>Welcome to Gemini Chat</h2>
  <p>Set your Google API key in <strong>Settings</strong>, pick a model above, then start chatting.</p>
</div>

<div id="input-bar">
  <textarea id="user-input" rows="1" placeholder="Type a message…" disabled></textarea>
  <button id="send-btn" disabled>Send</button>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙ Settings</h2>

    <label for="api-key">API Key</label>
    <input type="password" id="api-key" placeholder="AIza…" autocomplete="off">

    <label for="model-select-modal">Model</label>
    <select id="model-select-modal"></select>

    <label for="system-prompt">System Prompt</label>
    <textarea id="system-prompt" placeholder="You are a helpful assistant."></textarea>

    <label for="max-tokens">Max Tokens (per request)</label>
    <input type="number" id="max-tokens" value="8192" min="1" max="65536">

    <label for="temperature">Temperature</label>
    <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1">

    <div class="modal-actions">
      <button id="settings-cancel">Cancel</button>
      <button id="settings-save" class="primary">Save</button>
    </div>
  </div>
</div>

<script>
(() => {
  const BASE_URL = 'https://generativelanguage.googleapis.com/v1beta/models';

  const MODEL_LIST = [
    { id: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash' },
    { id: 'gemini-2.5-flash-lite', label: 'Gemini 2.5 Flash Lite' },
    { id: 'gemini-2.5-pro', label: 'Gemini 2.5 Pro' },
    { id: 'gemini-3-flash', label: 'Gemini 3 Flash (preview)' },
    { id: 'gemini-3.1-flash-lite', label: 'Gemini 3.1 Flash Lite (preview)' },
    { id: 'custom', label: '✏️ Custom model…' },
  ];

  // ── Resolved model name (handles "custom" selection) ──
  function resolveModel() {
    return settings.model === 'custom' ? (settings.customModel || 'gemini-2.5-flash') : settings.model;
  }

  let conversations = [];
  let streaming = false;
  let abortCtrl = null;

  const $ = (s) => document.querySelector(s);
  const chatEl = $('#chat');
  const welcomeEl = $('#welcome');
  const userInput = $('#user-input');
  const sendBtn = $('#send-btn');
  const statusEl = $('#status');
  const modelSelect = $('#model-select');
  const modelSelectModal = $('#model-select-modal');

  MODEL_LIST.forEach(m => {
    const o1 = document.createElement('option'); o1.value = m.id; o1.textContent = m.label;
    modelSelect.appendChild(o1);
    const o2 = document.createElement('option'); o2.value = m.id; o2.textContent = m.label;
    modelSelectModal.appendChild(o2);
  });

  // ── Custom model input ──
  function showCustomModelModal() {
    const name = prompt('Enter Gemini model ID (e.g. gemini-2.5-pro, gemini-3.1-pro):', settings.customModel || '');
    if (name !== null) {
      settings.customModel = name.trim();
      localStorage.setItem('gemini_custom_model', settings.customModel);
    }
  }

  modelSelect.addEventListener('change', () => {
    if (modelSelect.value === 'custom') showCustomModelModal();
  });
  modelSelectModal.addEventListener('change', () => {
    if (modelSelectModal.value === 'custom') showCustomModelModal();
  });

  // ── List available models from API ──
  async function listAvailableModels() {
    if (!settings.apiKey) { alert('Set your API key first.'); return; }
    const btn = $('#list-models-btn');
    btn.disabled = true; btn.textContent = '⏳';
    try {
      const res = await fetch(`${BASE_URL}?key=${settings.apiKey}`);
      if (!res.ok) { const err = await res.text(); throw new Error(`API ${res.status}: ${err}`); }
      const json = await res.json();
      const models = json.models || [];
      // Filter to only generateContent models
      const chatModels = models.filter(m => {
        const methods = m.supportedGenerationMethods || [];
        return methods.includes('generateContent');
      });
      if (chatModels.length === 0) {
        alert('No models available for generateContent.\n\nRaw response:\n' + JSON.stringify(json, null, 2).slice(0, 2000));
        return;
      }
      const list = chatModels.map(m => `${m.name.replace('models/', '')}  (v${m.version}, ${m.inputTokenLimit} in / ${m.outputTokenLimit} out)`).join('\n');
      alert('Available models for chat:\n\n' + list);
    } catch (err) {
      alert('Error listing models:\n' + err.message);
    } finally {
      btn.disabled = false; btn.textContent = '📋';
    }
  }

  $('#list-models-btn').addEventListener('click', listAvailableModels);

  function loadSettings() {
    return {
      apiKey: localStorage.getItem('gemini_api_key') || '',
      model: localStorage.getItem('gemini_model') || 'gemini-2.5-flash',
      customModel: localStorage.getItem('gemini_custom_model') || '',
      systemPrompt: localStorage.getItem('gemini_system_prompt') || 'You are a helpful assistant.',
      maxTokens: parseInt(localStorage.getItem('gemini_max_tokens') || '8192'),
      temperature: parseFloat(localStorage.getItem('gemini_temperature') || '0.7'),
    };
  }
  function saveSettings(s) {
    localStorage.setItem('gemini_api_key', s.apiKey);
    localStorage.setItem('gemini_model', s.model);
    localStorage.setItem('gemini_custom_model', s.customModel);
    localStorage.setItem('gemini_system_prompt', s.systemPrompt);
    localStorage.setItem('gemini_max_tokens', s.maxTokens);
    localStorage.setItem('gemini_temperature', s.temperature);
  }
  function loadMessages() {
    try { return JSON.parse(localStorage.getItem('gemini_messages') || '[]'); } catch { return []; }
  }
  function saveMessages() {
    localStorage.setItem('gemini_messages', JSON.stringify(conversations));
  }

  let settings = loadSettings();
  conversations = loadMessages();

  function syncModelSelects() { modelSelect.value = settings.model; modelSelectModal.value = settings.model; }
  syncModelSelects();

  function updateStatus() {
    if (settings.apiKey) {
      statusEl.innerHTML = '<span class="status-dot connected"></span>ready';
      userInput.disabled = false; sendBtn.disabled = false;
    } else {
      statusEl.innerHTML = '<span class="status-dot disconnected"></span>no key';
      userInput.disabled = true; sendBtn.disabled = true;
    }
  }

  function renderAll() {
    chatEl.innerHTML = '';
    if (conversations.length === 0) { welcomeEl.style.display = 'flex'; return; }
    welcomeEl.style.display = 'none';
    conversations.forEach((m) => appendBubble(m.role, m.content, false));
    scrollDown();
  }

  function appendBubble(role, content, save = true) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'assistant');
    const label = document.createElement('div');
    label.className = 'label'; label.textContent = role === 'user' ? 'You' : 'Gemini';
    div.appendChild(label);
    const text = document.createElement('div');
    text.textContent = content; div.appendChild(text);
    chatEl.appendChild(div);
    if (save) { conversations.push({ role, content }); saveMessages(); }
    return text;
  }

  function scrollDown() { chatEl.scrollTop = chatEl.scrollHeight; }

  renderAll(); updateStatus();

  modelSelect.addEventListener('change', () => {
    settings.model = modelSelect.value;
    localStorage.setItem('gemini_model', settings.model);
    modelSelectModal.value = settings.model;
    if (conversations.length > 0) {
      const div = document.createElement('div');
      div.className = 'msg model-change-notice';
      const chosen = MODEL_LIST.find(m => m.id === settings.model);
      div.textContent = `↻ Model changed to ${chosen ? chosen.label : settings.model}`;
      chatEl.appendChild(div); scrollDown();
    }
  });
  modelSelect.addEventListener('change', () => { modelSelectModal.value = modelSelect.value; });
  modelSelectModal.addEventListener('change', () => { modelSelect.value = modelSelectModal.value; });

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
  });

  function extractText(part) { if (part.text) return part.text; return ''; }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || streaming || !settings.apiKey) return;

    userInput.value = ''; userInput.style.height = 'auto';
    welcomeEl.style.display = 'none';
    appendBubble('user', text); scrollDown();

    const contents = [];
    conversations.forEach((m) => {
      contents.push({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.content }] });
    });

    const body = {
      contents,
      generationConfig: { maxOutputTokens: settings.maxTokens, temperature: settings.temperature },
    };
    if (settings.systemPrompt) {
      body.systemInstruction = { parts: [{ text: settings.systemPrompt }] };
    }

    streaming = true; sendBtn.disabled = true; sendBtn.textContent = '⏳'; modelSelect.disabled = true;

    const assistantText = appendBubble('assistant', '', false);
    assistantText.classList.add('typing-cursor'); scrollDown();

    abortCtrl = new AbortController();
    let fullResponse = '';

    try {
      const activeModel = resolveModel();
      const url = `${BASE_URL}/${activeModel}:streamGenerateContent?key=${settings.apiKey}&alt=sse`;

      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body), signal: abortCtrl.signal,
      });

      if (!res.ok) { const err = await res.text(); throw new Error(`API ${res.status}: ${err}`); }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n'); buffer = lines.pop() || '';
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data: ')) continue;
          const data = trimmed.slice(6);
          try {
            const json = JSON.parse(data);
            const candidates = json.candidates;
            if (candidates && candidates[0]?.content?.parts) {
              for (const part of candidates[0].content.parts) {
                const t = extractText(part);
                if (t) { fullResponse += t; assistantText.textContent = fullResponse; scrollDown(); }
              }
            }
          } catch (_) {}
        }
      }

      if (fullResponse) { conversations.push({ role: 'assistant', content: fullResponse }); saveMessages(); }
      assistantText.classList.remove('typing-cursor');

    } catch (err) {
      if (err.name === 'AbortError') {
        assistantText.textContent = fullResponse || '(stopped)';
        if (fullResponse) { conversations.push({ role: 'assistant', content: fullResponse }); saveMessages(); }
      } else { assistantText.textContent = 'Error: ' + err.message; assistantText.style.color = '#f87171'; }
      assistantText.classList.remove('typing-cursor');
    } finally {
      streaming = false; sendBtn.disabled = false; sendBtn.textContent = 'Send';
      modelSelect.disabled = false; abortCtrl = null; userInput.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  const modal = $('#settings-modal');
  $('#settings-btn').addEventListener('click', () => {
    $('#api-key').value = settings.apiKey; modelSelectModal.value = settings.model;
    $('#system-prompt').value = settings.systemPrompt;
    $('#max-tokens').value = settings.maxTokens; $('#temperature').value = settings.temperature;
    modal.classList.add('active');
  });
  $('#settings-cancel').addEventListener('click', () => modal.classList.remove('active'));
  $('#settings-save').addEventListener('click', () => {
    settings.apiKey = $('#api-key').value.trim(); settings.model = modelSelectModal.value;
    settings.systemPrompt = $('#system-prompt').value;
    settings.maxTokens = parseInt($('#max-tokens').value) || 8192;
    settings.temperature = parseFloat($('#temperature').value) || 0.7;
    saveSettings(settings); syncModelSelects(); updateStatus(); modal.classList.remove('active');
  });
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

  $('#clear-btn').addEventListener('click', () => {
    if (confirm('Clear all messages? This cannot be undone.')) { conversations = []; saveMessages(); renderAll(); }
  });

  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && streaming && abortCtrl) abortCtrl.abort(); });
})();
</script>
</body>
</html>
