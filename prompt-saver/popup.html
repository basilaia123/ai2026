<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt Saver</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="header-title">AI Prompt Saver</span>
      </div>
      <button class="btn-icon" id="toggleAdd" title="Add new prompt">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </header>

    <!-- Add Prompt Form -->
    <div class="add-form" id="addForm" style="display:none">
      <input type="text" id="newTitle" placeholder="Prompt title..." class="input" maxlength="80">
      <textarea id="newText" placeholder="Prompt text... use [PLACEHOLDER] for variable parts" class="textarea" rows="4"></textarea>
      <div class="form-row">
        <select id="newCategory" class="select">
          <option value="general">General</option>
          <option value="work">Work</option>
          <option value="creative">Creative</option>
          <option value="code">Code</option>
        </select>
        <input type="text" id="newTags" placeholder="tags, comma, separated" class="input">
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" id="cancelAdd">Cancel</button>
        <button class="btn btn-primary" id="saveNew">Save Prompt</button>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search prompts..." class="search-input">
    </div>

    <!-- Category Filter -->
    <div class="tabs">
      <button class="tab active" data-cat="all">All</button>
      <button class="tab" data-cat="general">General</button>
      <button class="tab" data-cat="work">Work</button>
      <button class="tab" data-cat="creative">Creative</button>
      <button class="tab" data-cat="code">Code</button>
    </div>

    <!-- Prompt List -->
    <div class="prompt-list" id="promptList">
      <div class="empty-state" id="emptyState" style="display:none">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="1.5" stroke-linecap="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>No prompts found</p>
        <span>Click + to add your first prompt</span>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
