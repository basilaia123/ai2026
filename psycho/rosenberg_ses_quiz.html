<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="როზენბერგის თვითშეფასების სკალა (RSES) - 10-პუნქტიანი სტანდარტიზებული ინსტრუმენტი. მხოლოდ საგანმანათლებლო მიზნით.">
    <title>Rosenberg SES - თვითშეფასების სკალა</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1923;
            --bg-secondary: #162231;
            --bg-card: #1a2a3a;
            --bg-card-hover: #1f3347;
            --accent: #8b7dc9;
            --accent-glow: rgba(139, 125, 201, 0.12);
            --accent-soft: #6b5faa;
            --accent-light: #b8aee8;
            --text-primary: #e8edf2;
            --text-secondary: #8fa3b8;
            --text-muted: #5a7089;
            --border: rgba(139, 125, 201, 0.12);
            --border-active: rgba(139, 125, 201, 0.35);
            --danger: #c94d6d;
            --danger-soft: rgba(201, 77, 109, 0.15);
            --warning: #c9a44d;
            --warning-soft: rgba(201, 164, 77, 0.15);
            --success: #4dc98a;
            --success-soft: rgba(77, 201, 138, 0.15);
            --orange: #c98c4d;
            --orange-soft: rgba(201, 140, 77, 0.15);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-secondary); text-decoration: none;
            font-size: 14px; margin-bottom: 20px; transition: color 0.3s ease;
        }
        .back-link:hover { color: var(--accent); }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans Georgian', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.7;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 20% 20%, rgba(139, 125, 201, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 80% 80%, rgba(77, 201, 138, 0.03) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 24px 80px;
            position: relative; z-index: 1;
        }

        /* Language toggle */
        .lang-toggle {
            position: fixed; top: 16px; right: 62px; z-index: 200;
            display: flex; border-radius: var(--radius-sm);
            overflow: hidden; border: 1px solid var(--border-active);
            background: var(--bg-card);
        }
        .lang-btn {
            padding: 6px 14px; font-family: inherit; font-size: 12px;
            font-weight: 600; cursor: pointer; border: none;
            background: transparent; color: var(--text-muted);
            transition: var(--transition); letter-spacing: 0.5px;
        }
        .lang-btn:hover { color: var(--text-primary); }
        .lang-btn.active { background: var(--accent); color: #fff; }

        /* Header */
        .header {
            text-align: center; margin-bottom: 36px;
            animation: fadeInDown 0.8s ease;
        }
        .header-icon {
            width: 60px; height: 60px;
            background: var(--accent-glow);
            border: 1px solid var(--border-active);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 28px;
        }
        .header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 6px; }
        .header .subtitle { font-size: 15px; color: var(--accent-light); font-weight: 500; margin-bottom: 8px; }
        .header p { font-size: 13px; color: var(--text-secondary); max-width: 520px; margin: 0 auto; font-weight: 300; }

        /* Disclaimer */
        .disclaimer {
            background: var(--danger-soft);
            border: 1px solid rgba(201, 77, 109, 0.25);
            border-radius: var(--radius); padding: 16px 20px;
            margin-bottom: 24px; font-size: 13px; color: #d4a0b0; line-height: 1.8;
            animation: fadeIn 0.8s ease 0.2s both;
        }
        .disclaimer strong { color: var(--danger); font-weight: 600; }

        /* Info box */
        .info-box {
            background: var(--accent-glow);
            border: 1px solid var(--border-active);
            border-radius: var(--radius); padding: 16px 20px;
            margin-bottom: 28px; font-size: 13px; color: var(--text-secondary); line-height: 1.8;
            animation: fadeIn 0.8s ease 0.3s both;
        }
        .info-box strong { color: var(--accent-light); }

        /* Scale legend */
        .scale-legend {
            display: flex; gap: 6px; flex-wrap: wrap;
            margin-bottom: 28px; animation: fadeIn 0.8s ease 0.35s both;
        }
        .scale-pill {
            padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
            border: 1px solid var(--border);
        }
        .sp-sa { background: var(--success-soft); color: var(--success); }
        .sp-a  { background: var(--warning-soft); color: var(--warning); }
        .sp-d  { background: var(--orange-soft);  color: var(--orange); }
        .sp-sd { background: var(--danger-soft);  color: var(--danger); }

        /* Progress */
        .progress-container {
            margin-bottom: 24px; animation: fadeIn 0.8s ease 0.4s both;
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-primary); padding: 12px 0;
        }
        .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .progress-label { font-size: 13px; color: var(--text-muted); }
        .progress-count { font-size: 13px; color: var(--accent); font-weight: 500; }
        .progress-bar { height: 4px; background: var(--bg-card); border-radius: 2px; overflow: hidden; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-soft), var(--accent));
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Question blocks */
        .question-block {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px; margin-bottom: 14px;
            transition: var(--transition); position: relative; overflow: hidden;
        }
        .question-block::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 3px; background: var(--text-muted); transition: var(--transition);
        }
        .question-block.answered::before { background: var(--accent); }
        .question-block.answered { border-color: var(--border-active); }

        .question-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
        .question-number {
            display: flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 8px;
            background: var(--accent-glow); color: var(--accent);
            font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
        }
        .question-meta { flex: 1; }
        .question-title { font-size: 15px; font-weight: 600; line-height: 1.5; }
        .question-dir {
            display: inline-block; margin-top: 4px;
            font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
        }
        .dir-pos { background: rgba(77,201,138,0.15); color: #4dc98a; }
        .dir-neg { background: rgba(201,77,109,0.12); color: #e87a99; }

        /* 4-option grid */
        .option-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        @media (max-width: 500px) {
            .option-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .option-item {
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; gap: 8px;
            padding: 14px 8px 12px; border-radius: var(--radius-sm);
            cursor: pointer; transition: var(--transition);
            border: 1px solid var(--border); text-align: center;
            position: relative; min-height: 70px;
        }
        .option-item:hover { background: var(--bg-card-hover); border-color: var(--border-active); }

        .option-item.selected { border-color: var(--border-active); }
        .option-item.selected.opt-score-0 { background: var(--success-soft); border-color: rgba(77,201,138,0.35); }
        .option-item.selected.opt-score-1 { background: var(--warning-soft); border-color: rgba(201,164,77,0.35); }
        .option-item.selected.opt-score-2 { background: var(--orange-soft);  border-color: rgba(201,140,77,0.35); }
        .option-item.selected.opt-score-3 { background: var(--danger-soft);  border-color: rgba(201,77,109,0.35); }

        .option-dot {
            width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid var(--text-muted); flex-shrink: 0;
            transition: var(--transition); position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
        }
        .option-item.selected .option-dot        { border-color: var(--accent); background: var(--accent); }
        .option-item.selected.opt-score-0 .option-dot { border-color: var(--success); background: var(--success); }
        .option-item.selected.opt-score-1 .option-dot { border-color: var(--warning); background: var(--warning); }
        .option-item.selected.opt-score-2 .option-dot { border-color: var(--orange);  background: var(--orange); }
        .option-item.selected.opt-score-3 .option-dot { border-color: var(--danger);  background: var(--danger); }

        .option-text {
            font-size: 11.5px; color: var(--text-secondary);
            line-height: 1.4; transition: var(--transition);
            margin-top: 26px;
        }
        .option-item.selected .option-text { color: var(--text-primary); font-weight: 600; }

        /* Submit */
        .submit-area { margin-top: 28px; text-align: center; }
        .btn {
            padding: 14px 36px; border-radius: var(--radius-sm);
            font-family: inherit; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: var(--transition);
            border: none; background: var(--accent); color: #fff;
        }
        .btn:hover { background: var(--accent-soft); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(139,125,201,0.4); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Results */
        .results-container { display: none; animation: fadeInUp 0.8s ease; }
        .results-container.active { display: block; }

        .result-main {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 36px 32px;
            margin-bottom: 24px; text-align: center;
        }
        .result-icon { font-size: 48px; margin-bottom: 16px; }
        .result-score { font-size: 60px; font-weight: 700; margin-bottom: 4px; }
        .result-max { font-size: 16px; color: var(--text-muted); margin-bottom: 16px; }
        .result-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
        .result-subtitle { font-size: 14px; color: var(--text-secondary); font-weight: 300; margin-bottom: 20px; max-width: 460px; margin-left: auto; margin-right: auto; }

        .severity-badge { display: inline-block; padding: 7px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .sev-low    { background: var(--danger-soft);  color: var(--danger); }
        .sev-normal { background: var(--success-soft); color: var(--success); }
        .sev-high   { background: var(--accent-glow);  color: var(--accent-light); }

        /* Score bar */
        .score-bar-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
        .score-bar-label { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
        .score-bar-track { height: 28px; border-radius: 14px; background: var(--bg-secondary); position: relative; overflow: hidden; display: flex; }
        .score-bar-segment {
            height: 100%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.7);
        }
        .seg-low    { background: rgba(201,77,109,0.28); }
        .seg-normal { background: rgba(77,201,138,0.28); }
        .seg-high   { background: rgba(139,125,201,0.35); }

        .score-marker {
            position: absolute; top: -8px; width: 3px; height: 44px;
            background: var(--text-primary); border-radius: 2px; z-index: 5;
            transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .score-bar-labels { display: flex; margin-top: 8px; font-size: 11px; color: var(--text-muted); }
        .score-bar-labels span { display: flex; align-items: center; justify-content: center; }

        /* Gauge */
        .gauge-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
        .gauge-svg { width: 200px; height: 110px; }

        /* Item breakdown */
        .detail-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
        .detail-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
        .detail-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-num { flex-shrink: 0; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; background: var(--accent-glow); color: var(--accent); }
        .detail-name { flex: 1; color: var(--text-secondary); }
        .detail-dir { flex-shrink: 0; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; }
        .detail-score-pill { flex-shrink: 0; padding: 3px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; min-width: 28px; text-align: center; }
        .pill-0 { background: var(--danger-soft);  color: var(--danger); }
        .pill-1 { background: var(--orange-soft);  color: var(--orange); }
        .pill-2 { background: var(--warning-soft); color: var(--warning); }
        .pill-3 { background: var(--success-soft); color: var(--success); }

        /* Info sections */
        .scoring-info { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 16px; }
        .scoring-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; color: var(--accent-light); }
        .scoring-info p { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }

        .treatment-note { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-top: 16px; }
        .treatment-note h3 { font-size: 15px; font-weight: 600; margin-bottom: 10px; color: var(--accent); }
        .treatment-note p { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }

        .restart-btn {
            display: block; width: 100%; margin-top: 14px; padding: 14px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-secondary);
            font-family: inherit; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: var(--transition);
        }
        .restart-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .container { padding: 24px 14px 60px; }
            .header h1 { font-size: 20px; }
            .question-block { padding: 18px 14px; }
            .result-score { font-size: 48px; }
        }

        @media print {
            body { background: white; color: #1a1a1a; }
            body::before { display: none; }
            .container { max-width: 100%; padding: 20px; }
            .lang-toggle, .theme-toggle, #questionsContainer, #submitArea, .progress-container, .info-box, .scale-legend, .restart-btn { display: none !important; }
            .results-container { display: block !important; }
            .result-main, .score-bar-container, .detail-section, .scoring-info, .treatment-note { background: #f5f5f5; border: 1px solid #ccc; break-inside: avoid; }
            .severity-badge { border: 1px solid currentColor; }
        }

        /* Light mode */
        body.light {
            --bg-primary: #f0f4f8;
            --bg-secondary: #e2e8f0;
            --bg-card: #ffffff;
            --bg-card-hover: #f8fafc;
            --text-primary: #1e2d3d;
            --text-secondary: #4a6580;
            --text-muted: #8fa3b8;
            --border: rgba(0,0,0,0.10);
            --border-active: rgba(0,0,0,0.25);
        }
        body.light::before { opacity: 0.15; }

        .theme-toggle {
            position: fixed; top: 16px; right: 16px; z-index: 300;
            width: 38px; height: 38px; border-radius: 50%;
            border: 1px solid var(--border-active); background: var(--bg-card);
            color: var(--text-secondary); font-size: 17px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .theme-toggle:hover { transform: scale(1.08); color: var(--text-primary); }
    </style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Dark / Light Mode">☀️</button>
<script>if(localStorage.getItem('psycho-theme')==='light'){document.body.classList.add('light');document.getElementById('themeToggle').textContent='🌙';}</script>

<div class="lang-toggle">
    <button class="lang-btn active" id="btnKa" onclick="setLang('ka')">KA</button>
    <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
</div>

<div class="container">
    <a href="index.html" class="back-link">← მთავარი</a>

    <div class="header">
        <div class="header-icon">🪞</div>
        <h1 id="headerTitle">Rosenberg თვითშეფასების სკალა</h1>
        <div class="subtitle">Rosenberg Self-Esteem Scale (RSES)</div>
        <p id="headerDesc">10-პუნქტიანი საერთაშორისო სტანდარტი საკუთარი ღირებულებისა და თვითშეფასების დონის გაზომვისთვის. ავტორი: Morris Rosenberg (1965).</p>
    </div>

    <div class="disclaimer" id="disclaimerBox"></div>
    <div class="info-box" id="infoBox"></div>

    <div class="scale-legend" id="scaleLegend">
        <span class="scale-pill sp-sa" id="leg0"></span>
        <span class="scale-pill sp-a"  id="leg1"></span>
        <span class="scale-pill sp-d"  id="leg2"></span>
        <span class="scale-pill sp-sd" id="leg3"></span>
    </div>

    <div class="progress-container" id="progressArea">
        <div class="progress-info">
            <span class="progress-label" id="progressLabel">0 / 10 პუნქტი</span>
            <span class="progress-count" id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
    </div>

    <div id="questionsContainer"></div>

    <div class="submit-area" id="submitArea">
        <button class="btn" id="submitBtn" onclick="calculateResults()" disabled>📊 შედეგის ნახვა</button>
        <p style="font-size:12px;color:var(--text-muted);margin-top:10px;" id="submitHint"></p>
    </div>

    <div class="results-container" id="results"></div>
</div>

<script>
// ===================== I18N =====================
const i18n = {
    ka: {
        htmlLang: 'ka',
        headerTitle: 'Rosenberg თვითშეფასების სკალა',
        headerDesc: '10-პუნქტიანი საერთაშორისო სტანდარტი საკუთარი ღირებულებისა და თვითშეფასების დონის გაზომვისთვის. ავტორი: Morris Rosenberg (1965).',
        disclaimer: '<strong>⚠️ გაფრთხილება:</strong> RSES არის <strong>სკრინინგის ინსტრუმენტი</strong> და <strong>არ ცვლის</strong> პროფესიონალურ შეფასებას. დაბალი ქულა მიუთითებს პოტენციურ პრობლემებზე, თუმცა მხოლოდ სპეციალისტი ადგენს სრულ კლინიკურ სურათს.',
        infoBox: '<strong>📋 ინსტრუქცია:</strong> წაიკითხეთ თითოეული განცხადება და მონიშნეთ, რამდენად ეთანხმებით ან არ ეთანხმებით. პასუხობდეთ გულწრფელად - სწორი და მცდარი პასუხი არ არსებობს.',
        options: ['სრულად ვეთანხმები', 'ვეთანხმები', 'არ ვეთანხმები', 'სრულად არ ვეთანხმები'],
        optShort: ['SA', 'A', 'D', 'SD'],
        dirPos: '(+) პოზიტიური',
        dirNeg: '(−) რევერსული',
        submitBtn: '📊 შედეგის ნახვა',
        progressQ: 'პუნქტი',
        hintAll: 'ყველა პუნქტი შევსებულია ✓',

    en: {

        },

    }
};

// ===================== QUESTIONS =====================
// positive: SA=3, A=2, D=1, SD=0
// negative (reversed): SA=0, A=1, D=2, SD=3
const questions = [
    { id:1,  pos:true,  text:'ზოგადად, ჩემი თავით კმაყოფილი ვარ.',
                         textEn:'On the whole, I am satisfied with myself.' },
    { id:2,  pos:false, text:'ზოგჯერ მგონია, რომ საერთოდ ვარგისი არ ვარ.',
                         textEn:'At times I think I am no good at all.' },
    { id:3,  pos:true,  text:'ვფიქრობ, რომ ბევრი კარგი თვისება მაქვს.',
                         textEn:'I feel that I have a number of good qualities.' },
    { id:4,  pos:true,  text:'ისე ვარ, რომ სხვებთან თანაბრად შემიძლია საქმის კეთება.',
                         textEn:'I am able to do things as well as most other people.' },
    { id:5,  pos:false, text:'ვგრძნობ, რომ ამაყობის საფუძვლი ბევრი არ მაქვს.',
                         textEn:'I feel I do not have much to be proud of.' },
    { id:6,  pos:false, text:'ზოგჯერ ნამდვილად უსარგებლოდ ვგრძნობ თავს.',
                         textEn:'I certainly feel useless at times.' },
    { id:7,  pos:true,  text:'ვგრძნობ, რომ სხვებთან თანაბარი ღირებულების ადამიანი ვარ.',
                         textEn:'I feel that I\'m a person of worth, at least on an equal plane with others.' },
    { id:8,  pos:false, text:'მსურდა, საკუთარ თავს მეტი პატივი სცემდი.',
                         textEn:'I wish I could have more respect for myself.' },
    { id:9,  pos:false, text:'ძირითადად, ვგრძნობ, რომ წარუმატებელი ვარ.',
                         textEn:'All in all, I am inclined to feel that I am a failure.' },
    { id:10, pos:true,  text:'საკუთარი თავისადმი დადებითი დამოკიდებულება მაქვს.',
                         textEn:'I take a positive attitude toward myself.' }
];

// Score per option index [SA, A, D, SD]
// positive item: [3, 2, 1, 0]   visual class = 3 - score
// negative item:  [0, 1, 2, 3]  visual class = 3 - score  → same formula!
function getScore(q, optIdx) {
    return q.pos ? [3,2,1,0][optIdx] : [0,1,2,3][optIdx];
}
function getVisualClass(score) { return 3 - score; } // 3=green, 0=red in my theme - wait, fix:
// Actually opt-score-0 = green, opt-score-3 = red
// For positive item SA (score=3): we want green → visual 0   → 3-3=0 ✓
// For positive item SD (score=0): we want red  → visual 3   → 3-0=3 ✓
// Same works for negative items.

// ===================== STATE =====================
const userAnswers = {}; // qid → optionIndex
let answeredCount = 0;
let currentLang = 'ka';

// ===================== LANGUAGE =====================
function setLang(lang) {
    currentLang = lang;
    document.documentElement.lang = i18n[lang].htmlLang;
    document.getElementById('btnKa').classList.toggle('active', lang === 'ka');
    document.getElementById('btnEn').classList.toggle('active', lang === 'en');
    const t = i18n[lang];
    document.getElementById('headerTitle').textContent  = t.headerTitle;
    document.getElementById('headerDesc').textContent   = t.headerDesc;
    document.getElementById('disclaimerBox').innerHTML  = t.disclaimer;
    document.getElementById('infoBox').innerHTML        = t.infoBox;
    document.getElementById('submitBtn').textContent    = t.submitBtn;

    // Scale legend
    t.options.forEach((label, i) => {
        const el = document.getElementById('leg' + i);
        if (el) el.textContent = label;
    });

    rebuildQuestions();
    updateProgress();

    if (document.getElementById('results').classList.contains('active')) {
        calculateResults();
    }
}

function getQText(q) { return currentLang === 'en' ? q.textEn : q.text; }

// ===================== BUILD =====================
function rebuildQuestions() {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    const t = i18n[currentLang];

    questions.forEach(q => {
        let optHtml = '';
        t.options.forEach((label, idx) => {
            const score = getScore(q, idx);
            const vc = getVisualClass(score);
            const sel = userAnswers[q.id] === idx ? ' selected' : '';
            optHtml += `
                <div class="option-item opt-score-${vc}${sel}"
                     data-qid="${q.id}" data-idx="${idx}" onclick="selectOption(this)">
                    <div class="option-dot"></div>
                    <div class="option-text">${label}</div>
                </div>`;
        });

        const answered = q.id in userAnswers;
        const dirClass = q.pos ? 'dir-pos' : 'dir-neg';
        const dirLabel = q.pos ? t.dirPos : t.dirNeg;

        const block = document.createElement('div');
        block.className = 'question-block' + (answered ? ' answered' : '');
        block.id = `qblock-${q.id}`;
        block.innerHTML = `
            <div class="question-header">
                <div class="question-number">${q.id}</div>
                <div class="question-meta">
                    <div class="question-title">${getQText(q)}</div>
                    <span class="question-dir ${dirClass}">${dirLabel}</span>
                </div>
            </div>
            <div class="option-grid">${optHtml}</div>`;
        container.appendChild(block);
    });
}

// ===================== INTERACTION =====================
function selectOption(el) {
    const qid = parseInt(el.dataset.qid);
    const idx  = parseInt(el.dataset.idx);

    const block = document.getElementById(`qblock-${qid}`);
    block.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');

    const wasNew = !(qid in userAnswers);
    userAnswers[qid] = idx;
    if (wasNew) answeredCount++;

    block.classList.add('answered');
    updateProgress();
}

function updateProgress() {
    const t   = i18n[currentLang];
    const tot = questions.length;
    const pct = Math.round((answeredCount / tot) * 100);

    document.getElementById('progressFill').style.width    = pct + '%';
    document.getElementById('progressPercent').textContent = pct + '%';
    document.getElementById('progressLabel').textContent   = `${answeredCount} / ${tot} ${t.progressQ}`;

    const btn  = document.getElementById('submitBtn');
    const hint = document.getElementById('submitHint');
    if (answeredCount === tot) {
        btn.disabled     = false;
        hint.textContent = t.hintAll;
        hint.style.color = 'var(--success)';
    } else {
        btn.disabled     = true;
        hint.textContent = t.hintRemain(tot - answeredCount);
        hint.style.color = 'var(--text-muted)';
    }
}

// ===================== RESULTS =====================
function calculateResults() {
    if (answeredCount < questions.length) return;
    const t = i18n[currentLang];

    let total = 0;
    questions.forEach(q => { total += getScore(q, userAnswers[q.id]); });

    let sevKey, sevClass, icon;
    if      (total <= 14) { sevKey = 'low';    sevClass = 'sev-low';    icon = '🔴'; }
    else if (total <= 25) { sevKey = 'normal'; sevClass = 'sev-normal'; icon = '✅'; }
    else                  { sevKey = 'high';   sevClass = 'sev-high';   icon = '⭐'; }

    const colorMap = { low: 'danger', normal: 'success', high: 'accent' };
    const colorVar = colorMap[sevKey];

    // Gauge SVG (half-circle)
    const pct = total / 30;
    const angle = pct * 180; // 0° = left, 180° = right
    const rad = (angle - 90) * Math.PI / 180;
    const cx = 100, cy = 100, r = 80;
    const ex = cx + r * Math.cos(rad);
    const ey = cy + r * Math.sin(rad);
    const gaugeColor = sevKey === 'low' ? '#c94d6d' : sevKey === 'normal' ? '#4dc98a' : '#8b7dc9';
    const gaugeArc = `M 20 100 A ${r} ${r} 0 0 1 ${ex.toFixed(1)} ${ey.toFixed(1)}`;

    let html = `
        <div class="result-main">
            <div class="result-icon">${icon}</div>
            <div class="result-score" style="color:var(--${colorVar})">${total}</div>
            <div class="result-max">${t.resultMax}</div>
            <div class="result-title">${t.resultTitles[sevKey]}</div>
            <div class="result-subtitle">${t.sevDescs[sevKey]}</div>
            <span class="severity-badge ${sevClass}">${t.sevLabels[sevKey]}</span>
        </div>`;

    // Score bar
    const markerPct = (total / 30) * 100;
    html += `
        <div class="score-bar-container">
            <div class="score-bar-label">${t.scoreBarLabel} &nbsp;|&nbsp; ქულა: ${total} / 30</div>
            <div class="score-bar-track">
                <div class="score-bar-segment seg-low"    style="width:${(15/30)*100}%">0–14</div>
                <div class="score-bar-segment seg-normal" style="width:${(11/30)*100}%">15–25</div>
                <div class="score-bar-segment seg-high"   style="width:${(5/30)*100}%">26–30</div>
                <div class="score-marker" style="left:${markerPct}%"></div>
            </div>
            <div class="score-bar-labels">
                <span style="width:${(15/30)*100}%">${t.sevLabels.low}</span>
                <span style="width:${(11/30)*100}%">${t.sevLabels.normal}</span>
                <span style="width:${(5/30)*100}%">${t.sevLabels.high}</span>
            </div>
        </div>`;

    // Interpretation
    html += `<div class="scoring-info"><h3>${t.interpretTitle}</h3><p>${t.interpretText}</p></div>`;

    // Item detail
    html += `<div class="detail-section"><h3>${t.detailTitle}</h3>`;
    questions.forEach(q => {
        const score = getScore(q, userAnswers[q.id]);
        const name  = currentLang === 'en' ? q.textEn : q.text;
        const dirClass = q.pos ? 'dir-pos' : 'dir-neg';
        const dirLabel = q.pos ? t.dirPos : t.dirNeg;
        html += `
            <div class="detail-row">
                <div class="detail-num">${q.id}</div>
                <div class="detail-name">${name}</div>
                <span class="question-dir ${dirClass} detail-dir" style="font-size:10px;padding:2px 7px;border-radius:8px;">${dirLabel}</span>
                <div class="detail-score-pill pill-${score}">${score}</div>
            </div>`;
    });
    html += `</div>`;

    // Treatment
    html += `<div class="treatment-note"><h3>${t.treatmentTitle}</h3><p>${t.treatmentText}</p></div>`;

    html += `
        <button class="restart-btn" onclick="window.print()" style="margin-top:20px;">${t.printBtn}</button>
        <button class="restart-btn" onclick="restart()">${t.restartBtn}</button>`;

    document.getElementById('questionsContainer').style.display = 'none';
    document.getElementById('submitArea').style.display         = 'none';
    document.getElementById('progressArea').style.display       = 'none';
    document.querySelector('.info-box').style.display           = 'none';
    document.getElementById('scaleLegend').style.display        = 'none';

    const el = document.getElementById('results');
    el.innerHTML = html;
    el.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
    Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
    answeredCount = 0;

    document.getElementById('questionsContainer').style.display = 'block';
    document.getElementById('submitArea').style.display         = 'block';
    document.getElementById('progressArea').style.display       = 'block';
    document.querySelector('.info-box').style.display           = 'block';
    document.getElementById('scaleLegend').style.display        = 'flex';
    document.getElementById('results').classList.remove('active');
    document.getElementById('results').innerHTML = '';

    rebuildQuestions();
    updateProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===================== THEME =====================
function toggleTheme() {
    var isLight = document.body.classList.toggle('light');
    localStorage.setItem('psycho-theme', isLight ? 'light' : 'dark');
    document.getElementById('themeToggle').textContent = isLight ? '🌙' : '☀️';
}

// ===================== INIT =====================
setLang('ka');
</script>
